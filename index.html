<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSecOps Periodic Table</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>DevSecOps Periodic Table</h1>
    <p>Explore 50+ DevSecOps Tools across the Software Lifecycle</p>
</header>

<section class="search-container">
    <input type="text" id="search" placeholder="Search tools...">
</section>

<section class="legend">
    <div class="item"><span class="version"></span>Version</div>
    <div class="item"><span class="build"></span>Build</div>
    <div class="item"><span class="cicd"></span>CI/CD</div>
    <div class="item"><span class="container"></span>Container</div>
    <div class="item"><span class="cloud"></span>Cloud</div>
    <div class="item"><span class="security"></span>Security</div>
    <div class="item"><span class="monitor"></span>Monitoring</div>
    <div class="item"><span class="artifact"></span>Artifact</div>
</section>

<main class="table"></main>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>

        <button id="visit-btn">Open Official Site</button>
        <button id="close-btn">Close</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
